services:
  # ── Backend (ts-node-dev hot reload) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env          # MONGO_URI (Atlas), JWT_SECRET, etc. come from here
    environment:
      NODE_ENV: development
      CLIENT_ORIGIN: http://localhost:5173
    volumes:
      - ./backend:/app          # kaynak kod hot-reload için mount edilir
      - backend_modules:/app/node_modules  # container'ın node_modules'ı korunur

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      # Tarayıcı host makinesinin port'una ulaşır (container'a değil)
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_modules:
  frontend_modules:
